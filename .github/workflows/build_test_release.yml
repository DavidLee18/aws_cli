name: Build, Test and Release

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      version:
        required: true
        type: string
        description: 'Version to deploy (e.g., 1.0.0)'

env:
  CARGO_TERM_COLOR: always
  
jobs:
  update_version:
    if: github.event_name != 'pull_request'
    permissions:
      contents: write
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ steps.tag_version.outputs.new_tag }}
      previous_tag: ${{ steps.tag_version.outputs.previous_tag }}
      changelog: ${{ steps.tag_version.outputs.changelog }}
    steps:
      - name: Validate Input Version
        if: github.event_name == 'workflow_dispatch'
        run: |
          if [[ ! "${{ github.event.inputs.version }}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid format. Expected X.Y.Z"
            exit 1
          fi
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Bump version and push tag
        id: tag_version
        uses: mathieudutour/github-tag-action@a22cf08638b34d5badda920f9daf6e72c477b07b
        with:
          dry_run: true
          github_token: ${{ secrets.GITHUB_TOKEN }}
          custom_tag: ${{ github.event.inputs.version }}
      - name: Apply Updated Version to Cargo.toml
        run: |
          sed -i -r 's/version = "[0-9]+.[0-9]+.[0-9]+"/version = "${{ steps.tag_version.outputs.new_version }}"/' Cargo.toml
          cat -e Cargo.toml
      # - uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9
      #   with:
      #     tag_name: ${{ steps.tag_version.outputs.new_tag }}
      #     commit_message: "set version to ${{ steps.tag_version.outputs.new_version }}"
  build-and-test:
    strategy:
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-15, macos-15-intel, windows-2025, windows-11-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Setup Rust Toolchain for GitHub CI
        uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606
        with:
          # Comma-separated list of Rust toolchain specifications. Last version becomes the default. -- see https://rust-lang.github.io/rustup/concepts/toolchains.html#toolchain-specification
          toolchain: # optional
          # target: x86_64-unknown-linux-gnu # optional
          components: # optional
          rustflags: # optional, default is -D warnings
          # Setup the last installed toolchain as the default via `rustup override`
          override: # optional, default is true
      - name: Test
        run: cargo test --verbose
      - name: Build
        if: github.event_name != 'pull_request'
        run: cargo build --release --verbose
      - run: mv target/release/aws.exe aws-${{ matrix.os }}.exe
        if: contains(matrix.os, 'windows')
      - run: mv target/release/aws aws-${{ matrix.os }}
        if: contains(matrix.os, 'windows') == false
      - name: Upload Artifact
        if: github.event_name != 'pull_request' && contains(matrix.os, 'windows')
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: ${{ matrix.os }}
          path: aws-${{ matrix.os }}.exe
      - name: Upload Artifact
        if: github.event_name != 'pull_request' && contains(matrix.os, 'windows') == false
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: ${{ matrix.os }}
          path: aws-${{ matrix.os }}
  release:
    needs: [update_version, build-and-test]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          merge-multiple: true
      - name: Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe
        with:
          draft: true
          prerelease: true
          tag_name: ${{ needs.update_version.outputs.new_tag }}
          previous_tag: ${{ needs.update_version.outputs.previous_tag }}
          body: ${{ needs.update_version.outputs.changelog }}
          files: |
            aws-*
      # - name: Get crates.io Token
      #   uses: rust-lang/crates-io-auth-action@bbd81622f20ce9e2dd9622e3218b975523e45bbe
      #   id: auth
      # - name: Publish to crates.io
      #   run: cargo publish
      #   env:
      #     CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
